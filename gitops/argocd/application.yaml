apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: macro-analytics-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/yur1k14/open-data-ai-analytics.git'
    targetRevision: HEAD
    path: gitops/app
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: macro-analytics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true